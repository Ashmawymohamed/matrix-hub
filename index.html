<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة التأثيرات - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:sans-serif;padding:20px}
        .container{max-width:1000px;margin:auto;background:rgba(20,25,45,.85);border-radius:28px;padding:30px 25px;border:1px solid rgba(255,255,255,.08)}
        .header{text-align:center;margin-bottom:25px;border-bottom:1px solid #2a2f45;padding-bottom:15px}
        .header h1{font-size:28px;background:linear-gradient(90deg,#00d2ff,#928dab);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header p{color:#8892b0;font-size:14px}
        .back-link{color:#00ff88;text-decoration:none;display:inline-block;margin-bottom:20px}
        .back-link:hover{text-decoration:underline}

        /* شبكة عرض الملفات */
        .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;margin-top:15px}
        .file-card{background:rgba(0,0,0,.4);border-radius:14px;padding:18px 20px;border:1px solid #2a3050;transition:all .3s;display:flex;justify-content:space-between;align-items:center}
        .file-card:hover{transform:translateY(-3px);border-color:#00ff88;box-shadow:0 8px 25px rgba(0,255,136,.08)}
        .file-info .file-name{font-weight:bold;font-size:15px;color:#e2e8f0}
        .file-info .file-size{font-size:11px;color:#94a3b8}
        .download-btn{background:#00ff88;color:#0a0a1a;border:none;padding:6px 14px;border-radius:8px;font-weight:bold;font-size:12px;cursor:pointer;text-decoration:none;transition:all .3s}
        .download-btn:hover{background:#00cc77;transform:scale(1.05)}

        .empty-state{text-align:center;padding:40px 20px;color:#8892b0}
        .empty-state .icon{font-size:48px;display:block;margin-bottom:10px}
        .footer{text-align:center;color:#475569;font-size:12px;margin-top:25px;border-top:1px solid #2a2f45;padding-top:15px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 مكتبة التأثيرات</h1>
            <p>اختر ملف التأثير الذي تريد تحميله</p>
        </div>

        <a href="../" class="back-link">← العودة للرئيسية</a>

        <!-- عرض الملفات -->
        <div class="file-grid" id="fileGrid">
            <!-- سيتم إدراج الملفات هنا تلقائياً عبر JavaScript -->
        </div>

        <div class="footer">جميع الملفات متاحة للتحميل المجاني</div>
    </div>

    <script>
        // قائمة ملفات الـ config الموجودة في مجلد files/
        const configFiles = [
            { name: 'config36.cfg', size: '2.4 KB' },
            { name: 'config37.cfg', size: '1.8 KB' },
            { name: 'config153.cfg', size: '3.1 KB' },
            { name: 'config200.cfg', size: '2.0 KB' },
            // أضف المزيد من الملفات هنا
        ];

        const grid = document.getElementById('fileGrid');

        if (configFiles.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <span class="icon">📂</span>
                    <p>لا توجد ملفات تأثيرات متاحة حالياً</p>
                </div>
            `;
        } else {
            grid.innerHTML = configFiles.map(file => `
                <div class="file-card">
                    <div class="file-info">
                        <div class="file-name">📄 ${file.name}</div>
                        <div class="file-size">${file.size}</div>
                    </div>
                    <a href="files/${file.name}" download class="download-btn">تحميل</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

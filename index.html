<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة التأثيرات - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px}
        .container{max-width:1100px;margin:auto;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:30px 25px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6)}
        .header{text-align:center;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:18px;margin-bottom:22px}
        .header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header p{color:#94a3b8;font-size:14px}
        .back-link{color:#3b82f6;text-decoration:none;font-weight:bold;display:inline-block;margin-bottom:12px}
        .back-link:hover{text-decoration:underline}

        /* شريط الأدوات */
        .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:center}
        .search-box{flex:1;min-width:200px;background:rgba(0,0,0,.4);border:1px solid #2a3050;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none;transition:border .3s}
        .search-box:focus{border-color:#3b82f6}
        .search-box::placeholder{color:#64748b}
        .filter-group{display:flex;gap:6px;flex-wrap:wrap}
        .filter-btn{background:rgba(255,255,255,.05);border:1px solid #2a3050;color:#94a3b8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .3s}
        .filter-btn:hover,.filter-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}

        .file-counter{color:#94a3b8;font-size:13px;display:block;margin-bottom:10px}

        /* شبكة الملفات */
        .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:8px}
        .file-card{background:rgba(0,0,0,.35);border-radius:14px;padding:16px 18px;border:1px solid #2a3050;transition:all .3s;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden}
        .file-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:14px 0 0 14px}
        .file-card:hover{transform:translateY(-4px);border-color:#3b82f6;box-shadow:0 12px 30px rgba(59,130,246,.08)}
        .file-card .file-info{display:flex;align-items:center;gap:12px;z-index:1}
        .file-card .file-icon{font-size:26px;width:36px;text-align:center}
        .file-card .file-details .file-name{font-weight:bold;font-size:14px;color:#e2e8f0}
        .file-card .file-details .file-meta{font-size:11px;color:#94a3b8;display:flex;gap:10px;flex-wrap:wrap}
        .file-card .file-details .file-meta span{display:inline-flex;align-items:center;gap:4px}
        .download-btn{background:#3b82f6;color:#fff;border:none;padding:7px 16px;border-radius:8px;font-weight:bold;font-size:12px;cursor:pointer;text-decoration:none;transition:all .3s;z-index:1;white-space:nowrap}
        .download-btn:hover{background:#2563eb;transform:scale(1.05)}

        /* ألوان جانبية حسب النوع */
        .file-card.type-basic::before{background:#3b82f6}
        .file-card.type-pro::before{background:#8b5cf6}
        .file-card.type-premium::before{background:#f59e0b}
        .file-card.type-advanced::before{background:#ec4899}
        .file-card.type-experimental::before{background:#14b8a6}
        .file-card.type-legacy::before{background:#64748b}
        .file-card.type-new::before{background:#22c55e}
        .file-card.type-basic .file-icon{color:#3b82f6}
        .file-card.type-pro .file-icon{color:#8b5cf6}
        .file-card.type-premium .file-icon{color:#f59e0b}
        .file-card.type-advanced .file-icon{color:#ec4899}
        .file-card.type-experimental .file-icon{color:#14b8a6}
        .file-card.type-legacy .file-icon{color:#64748b}
        .file-card.type-new .file-icon{color:#22c55e}

        .empty-state{text-align:center;padding:50px 20px;color:#94a3b8;grid-column:1/-1}
        .empty-state .icon{font-size:56px;display:block;margin-bottom:12px}
        .empty-state h3{color:#e2e8f0;margin-bottom:4px}

        .footer{text-align:center;color:#475569;font-size:13px;margin-top:25px;padding-top:15px;border-top:1px solid rgba(255,255,255,.05)}

        /* زر العودة للأعلى */
        .back-to-top{position:fixed;bottom:30px;right:30px;background:#3b82f6;color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:22px;cursor:pointer;box-shadow:0 8px 25px rgba(59,130,246,.4);transition:all .3s;display:none;align-items:center;justify-content:center;z-index:999}
        .back-to-top:hover{transform:scale(1.1);background:#2563eb}

        @media(max-width:600px){.file-grid{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.filter-group{justify-content:center}}
    </style>
</head>
<body>

<div class="container">

    <!-- زر العودة للأعلى -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <div class="header">
        <h1>📁 مكتبة التأثيرات</h1>
        <p>اختر ملف التأثير الذي تريد تحميله</p>
    </div>

    <a href="../" class="back-link">← العودة للرئيسية</a>

    <!-- شريط الأدوات -->
    <div class="toolbar">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن ملف...">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="basic">أساسي</button>
            <button class="filter-btn" data-filter="pro">Pro</button>
            <button class="filter-btn" data-filter="premium">مميز</button>
            <button class="filter-btn" data-filter="new">جديد</button>
        </div>
    </div>

    <span class="file-counter" id="fileCounter">عرض 0 ملف</span>

    <!-- شبكة الملفات -->
    <div class="file-grid" id="fileGrid"></div>

    <div class="footer">جميع الملفات متاحة للتحميل • يتم تحديث المكتبة باستمرار</div>
</div>

<script>
    // ===== قاعدة بيانات الملفات =====
    const configFiles = [
        // أساسي
        { name: 'config36.cfg', size: '2.4 KB', date: '2026-06-20', type: 'basic', icon: '⚙️', downloads: 142 },
        { name: 'config37.cfg', size: '1.8 KB', date: '2026-06-18', type: 'basic', icon: '🔧', downloads: 98 },
        { name: 'config40.cfg', size: '3.2 KB', date: '2026-06-15', type: 'basic', icon: '📐', downloads: 76 },
        // Pro
        { name: 'config153.cfg', size: '3.1 KB', date: '2026-06-22', type: 'pro', icon: '🚀', downloads: 215 },
        { name: 'config200.cfg', size: '2.0 KB', date: '2026-06-25', type: 'pro', icon: '💎', downloads: 187 },
        { name: 'config155.cfg', size: '4.0 KB', date: '2026-06-21', type: 'pro', icon: '🔥', downloads: 134 },
        // مميز
        { name: 'config99.cfg', size: '5.1 KB', date: '2026-06-26', type: 'premium', icon: '👑', downloads: 56 },
        { name: 'config101.cfg', size: '6.2 KB', date: '2026-06-24', type: 'premium', icon: '⭐', downloads: 43 },
        // متقدم
        { name: 'config250.cfg', size: '8.4 KB', date: '2026-06-23', type: 'advanced', icon: '🧠', downloads: 89 },
        { name: 'config300.cfg', size: '7.1 KB', date: '2026-06-19', type: 'advanced', icon: '🎯', downloads: 67 },
        // تجريبي
        { name: 'configX1.cfg', size: '3.8 KB', date: '2026-06-27', type: 'experimental', icon: '🧪', downloads: 34 },
        { name: 'configX2.cfg', size: '4.5 KB', date: '2026-06-26', type: 'experimental', icon: '⚡', downloads: 28 },
        // جديد
        { name: 'config400.cfg', size: '2.9 KB', date: '2026-06-27', type: 'new', icon: '🆕', downloads: 12 },
        { name: 'config401.cfg', size: '3.3 KB', date: '2026-06-27', type: 'new', icon: '✨', downloads: 8 },
        // قديم
        { name: 'config10.cfg', size: '1.2 KB', date: '2025-12-01', type: 'legacy', icon: '📦', downloads: 312 },
        { name: 'config15.cfg', size: '1.5 KB', date: '2025-11-15', type: 'legacy', icon: '🗂️', downloads: 278 },
    ];

    // ===== المنطق =====
    const grid = document.getElementById('fileGrid');
    const searchInput = document.getElementById('searchInput');
    const counter = document.getElementById('fileCounter');
    const backToTop = document.getElementById('backToTop');
    let currentFilter = 'all';

    function renderFiles(filter = 'all', search = '') {
        const filtered = configFiles.filter(file => {
            const matchFilter = filter === 'all' || file.type === filter;
            const matchSearch = file.name.toLowerCase().includes(search.toLowerCase());
            return matchFilter && matchSearch;
        });

        counter.textContent = `عرض ${filtered.length} ملف من ${configFiles.length}`;

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <span class="icon">🔍</span>
                    <h3>لا توجد نتائج</h3>
                    <p>حاول تغيير كلمة البحث أو تصفية النوع</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = filtered.map(file => `
            <div class="file-card type-${file.type}" data-file="${file.name}">
                <div class="file-info">
                    <span class="file-icon">${file.icon}</span>
                    <div class="file-details">
                        <div class="file-name">${file.name}</div>
                        <div class="file-meta">
                            <span>📦 ${file.size}</span>
                            <span>📅 ${file.date}</span>
                            <span>⬇️ ${file.downloads}</span>
                        </div>
                    </div>
                </div>
                <a href="files/${file.name}" download class="download-btn">⏬ تحميل</a>
            </div>
        `).join('');
    }

    // البحث
    searchInput.addEventListener('input', function() {
        renderFiles(currentFilter, this.value);
    });

    // الفلترة
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderFiles(currentFilter, searchInput.value);
        });
    });

    // زر العودة للأعلى
    window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
            backToTop.style.display = 'flex';
        } else {
            backToTop.style.display = 'none';
        }
    });

    // العرض الأولي
    renderFiles('all', '');
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:sans-serif;padding:20px}
        .container{max-width:700px;margin:auto;background:rgba(20,25,45,.85);border-radius:28px;padding:30px 25px;border:1px solid rgba(255,255,255,.08)}
        h1{text-align:center}
        .back-btn{display:inline-block;background:#334155;color:#fff;padding:8px 20px;border-radius:30px;text-decoration:none;font-size:13px;margin-bottom:15px}
        .stat-item{display:flex;justify-content:space-between;padding:12px 16px;background:#13182b;border-radius:10px;margin-bottom:8px;border-left:3px solid #8b5cf6}
        .stat-item .label{color:#94a3b8}
        .stat-item .value{color:#a78bfa;font-weight:bold}
        .stat-item .number{color:#00ff88;font-weight:bold}
        .footer{text-align:center;color:#475569;font-size:12px;margin-top:20px}
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">Back to Hub</a>
        <h1>Statistics</h1>
        <div class="stat-item">
            <span class="label">Total Downloads</span>
            <span class="number">1,247</span>
        </div>
        <div class="stat-item">
            <span class="label">Most Downloaded Effect</span>
            <span class="value">Tornado Spiral (ID: 36)</span>
        </div>
        <div class="stat-item">
            <span class="label">Effects Available</span>
            <span class="number">24</span>
        </div>
        <div class="stat-item">
            <span class="label">Videos Available</span>
            <span class="number">3</span>
        </div>
        <div class="stat-item">
            <span class="label">Last Update</span>
            <span class="value">2025-06-26</span>
        </div>
        <div class="footer">Statistics updated weekly</div>
    </div>
</body>
</html>

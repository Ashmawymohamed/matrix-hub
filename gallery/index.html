<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh}
        .container{max-width:1100px;margin:auto;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:35px 30px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6)}
        .header{text-align:center;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:20px;margin-bottom:25px}
        .header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header p{color:#94a3b8;font-size:15px}
        .back-link{color:#fbbf24;text-decoration:none;font-weight:bold;display:inline-block;margin-bottom:15px}
        .back-link:hover{text-decoration:underline}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:15px}
        .gallery-item{background:rgba(0,0,0,.3);border-radius:16px;padding:30px 15px;text-align:center;border:1px solid rgba(255,255,255,.06);transition:all .3s}
        .gallery-item:hover{transform:translateY(-4px);border-color:#f59e0b;box-shadow:0 12px 35px rgba(245,158,11,.08)}
        .gallery-item .icon{font-size:48px;display:block;margin-bottom:8px}
        .gallery-item .title{font-weight:bold;color:#e2e8f0}
        .gallery-item .desc{font-size:12px;color:#64748b;margin-top:4px}
        .footer{text-align:center;color:#475569;font-size:13px;margin-top:30px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}
        @media(max-width:600px){.gallery-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ معرض الماتريكس</h1>
            <p>عروض مرئية وتصاميم مستوحاة من عالم الماتريكس</p>
        </div>
        <a href="../" class="back-link">← العودة للرئيسية</a>
        <div class="gallery-grid">
            <div class="gallery-item"><span class="icon">🌌</span><span class="title">عرض رقم 1</span><span class="desc">تأثيرات سائلة</span></div>
            <div class="gallery-item"><span class="icon">💫</span><span class="title">عرض رقم 2</span><span class="desc">أنماط هندسية</span></div>
            <div class="gallery-item"><span class="icon">🌀</span><span class="title">عرض رقم 3</span><span class="desc">دوائر ضوئية</span></div>
            <div class="gallery-item"><span class="icon">⚡</span><span class="title">عرض رقم 4</span><span class="desc">ومضات كهربائية</span></div>
            <div class="gallery-item"><span class="icon">🔥</span><span class="title">عرض رقم 5</span><span class="desc">تأثيرات نارية</span></div>
            <div class="gallery-item"><span class="icon">💎</span><span class="title">عرض رقم 6</span><span class="desc">بلورات متوهجة</span></div>
        </div>
        <div class="footer">المزيد من العروض قريباً</div>
    </div>
</body>
</html>

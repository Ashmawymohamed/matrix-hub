<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:450px;width:100%;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:40px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6);text-align:center}
        .logo{font-size:48px;display:block;margin-bottom:10px}
        h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#00ff88,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
        .subtitle{color:#94a3b8;font-size:14px;margin-bottom:25px}
        .form-group{margin-bottom:18px;text-align:right}
        .form-group label{display:block;color:#e2e8f0;font-size:14px;margin-bottom:5px;font-weight:bold}
        .form-group input{width:100%;padding:12px 16px;background:rgba(0,0,0,.4);border:1px solid #2a3050;border-radius:10px;color:#fff;font-size:15px;outline:none;transition:border .3s}
        .form-group input:focus{border-color:#00ff88}
        .form-group input::placeholder{color:#64748b}
        .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#00ff88,#00d2ff);border:none;border-radius:12px;color:#0a0a1a;font-size:18px;font-weight:bold;cursor:pointer;transition:all .3s;margin-top:5px}
        .login-btn:hover{transform:scale(1.02);box-shadow:0 8px 30px rgba(0,255,136,.2)}
        .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .error-msg{color:#f43f5e;font-size:13px;margin-top:12px;display:none}
        .error-msg.show{display:block}
        .back-link{display:inline-block;margin-top:18px;color:#64748b;text-decoration:none;font-size:13px;transition:color .3s}
        .back-link:hover{color:#00ff88}
        .footer{color:#475569;font-size:12px;margin-top:20px;padding-top:15px;border-top:1px solid rgba(255,255,255,.05)}
        .hint{color:#64748b;font-size:12px;margin-top:8px}
        .hint strong{color:#00ff88}
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">🔐</span>
        <h1>تسجيل الدخول</h1>
        <p class="subtitle">ادخل كلمة المرور للوصول إلى المحتوى الحصري</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="passwordInput" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">🚀 دخول</button>
            <div class="error-msg" id="errorMsg">❌ كلمة المرور غير صحيحة. حاول مرة أخرى.</div>
        </form>
        <div class="hint">💡 كلمة المرور الافتراضية: <strong>matrix2026</strong></div>
        <a href="../" class="back-link">← العودة للرئيسية</a>
        <div class="footer">الأقسام المقفلة: الممزوج والفيديوهات</div>
    </div>

    <script>
        // كلمة المرور الصحيحة (يمكن تغييرها)
        const CORRECT_PASSWORD = 'matrix2026';

        // التحقق من وجود جلسة نشطة
        if (sessionStorage.getItem('loggedIn') === 'true') {
            // إعادة التوجيه إلى الصفحة التي جاء منها
            const returnTo = sessionStorage.getItem('returnTo') || '../';
            window.location.href = returnTo;
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            // تعطيل الزر مؤقتاً لمنع التكرار
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ جاري التحقق...';

            setTimeout(() => {
                if (password === CORRECT_PASSWORD) {
                    // تسجيل الدخول ناجح
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('loginTime', new Date().toISOString());
                    
                    // العودة للصفحة السابقة
                    const returnTo = sessionStorage.getItem('returnTo') || '../';
                    window.location.href = returnTo;
                } else {
                    // كلمة مرور خاطئة
                    errorMsg.classList.add('show');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🚀 دخول';
                }
            }, 600);
        }

        // الضغط على Enter
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });

        // تخزين الصفحة التي سيتم العودة إليها
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('return') || '../';
        sessionStorage.setItem('returnTo', returnTo);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Matrix Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh}
        .container{max-width:1200px;margin:auto;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:35px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6)}
        .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:20px;margin-bottom:25px;flex-wrap:wrap;gap:10px}
        .header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#00ff88,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header .logout-btn{background:rgba(244,63,94,.15);color:#f43f5e;border:1px solid rgba(244,63,94,.3);padding:8px 20px;border-radius:10px;cursor:pointer;transition:all .3s;font-weight:bold}
        .header .logout-btn:hover{background:#f43f5e;color:#fff}
        .back-link{color:#64748b;text-decoration:none;font-size:14px;display:inline-block;margin-bottom:15px}
        .back-link:hover{color:#00ff88}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;margin-bottom:30px}
        .stat-card{background:rgba(0,0,0,.3);border-radius:16px;padding:20px;text-align:center;border:1px solid rgba(255,255,255,.06);transition:all .3s}
        .stat-card:hover{transform:translateY(-3px);border-color:#00ff88}
        .stat-card .number{font-size:32px;font-weight:800;color:#00ff88;display:block}
        .stat-card .label{font-size:13px;color:#94a3b8;margin-top:4px}
        .stat-card .icon{font-size:24px;display:block;margin-bottom:4px}
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:25px;margin-top:20px}
        .chart-box{background:rgba(0,0,0,.25);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.05)}
        .chart-box h3{color:#e2e8f0;font-size:16px;margin-bottom:15px;text-align:center}
        .chart-box canvas{max-height:250px;max-width:100%}
        .footer{text-align:center;color:#475569;font-size:13px;margin-top:30px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}
        @media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 لوحة التحكم</h1>
            <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
        </div>
        <a href="../" class="back-link">← العودة للرئيسية</a>

        <!-- إحصائيات سريعة -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><span class="icon">📥</span><span class="number" id="totalDownloads">0</span><span class="label">إجمالي التحميلات</span></div>
            <div class="stat-card"><span class="icon">📄</span><span class="number" id="totalFiles">0</span><span class="label">عدد الملفات</span></div>
            <div class="stat-card"><span class="icon">👤</span><span class="number" id="activeUsers">0</span><span class="label">مستخدم نشط</span></div>
            <div class="stat-card"><span class="icon">⭐</span><span class="number" id="avgRating">0</span><span class="label">تقييم المستخدمين</span></div>
        </div>

        <!-- الرسوم البيانية -->
        <div class="charts-grid">
            <div class="chart-box"><h3>📈 أكثر الملفات تحميلاً</h3><canvas id="topFilesChart"></canvas></div>
            <div class="chart-box"><h3>📊 التحميلات حسب اليوم</h3><canvas id="dailyChart"></canvas></div>
        </div>

        <div class="footer">يتم تحديث البيانات تلقائياً • آخر تحديث: <span id="lastUpdate">الآن</span></div>
    </div>

    <script>
        // ===== بيانات وهمية (استبدلها ببيانات حقيقية من ملف JSON) =====
        const data = {
            totalDownloads: 1247,
            totalFiles: 16,
            activeUsers: 89,
            avgRating: 4.8,
            topFiles: [
                { name: 'config153.cfg', downloads: 215 },
                { name: 'config200.cfg', downloads: 187 },
                { name: 'config36.cfg', downloads: 142 },
                { name: 'config99.cfg', downloads: 56 },
                { name: 'config250.cfg', downloads: 89 }
            ],
            dailyDownloads: [
                { day: 'الأحد', count: 45 },
                { day: 'الإثنين', count: 38 },
                { day: 'الثلاثاء', count: 52 },
                { day: 'الأربعاء', count: 61 },
                { day: 'الخميس', count: 73 },
                { day: 'الجمعة', count: 58 },
                { day: 'السبت', count: 42 }
            ]
        };

        // ===== تحديث الإحصائيات =====
        document.getElementById('totalDownloads').textContent = data.totalDownloads;
        document.getElementById('totalFiles').textContent = data.totalFiles;
        document.getElementById('activeUsers').textContent = data.activeUsers;
        document.getElementById('avgRating').textContent = data.avgRating + ' ⭐';

        // ===== رسم بياني: أكثر الملفات تحميلاً =====
        const ctx1 = document.getElementById('topFilesChart').getContext('2d');
        new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: data.topFiles.map(f => f.name),
                datasets: [{
                    label: 'عدد التحميلات',
                    data: data.topFiles.map(f => f.downloads),
                    backgroundColor: ['#3b82f6', '#8b5cf6', '#f59e0b', '#ec4899', '#14b8a6'],
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8', font: { size: 10 } } } }
            }
        });

        // ===== رسم بياني: التحميلات اليومية =====
        const ctx2 = document.getElementById('dailyChart').getContext('2d');
        new Chart(ctx2, {
            type: 'line',
            data: {
                labels: data.dailyDownloads.map(d => d.day),
                datasets: [{
                    label: 'التحميلات',
                    data: data.dailyDownloads.map(d => d.count),
                    borderColor: '#00ff88',
                    backgroundColor: 'rgba(0,255,136,.1)',
                    fill: true,
                    tension: 0.3,
                    pointBackgroundColor: '#00ff88'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } }
            }
        });

        // ===== وقت التحديث =====
        const now = new Date();
        document.getElementById('lastUpdate').textContent = now.toLocaleString('ar-EG');

        // ===== التحقق من تسجيل الدخول =====
        function checkAuth() {
            if (sessionStorage.getItem('loggedIn') !== 'true') {
                window.location.href = 'login.html?return=dashboard.html';
            }
        }
        checkAuth();

        function logout() {
            sessionStorage.removeItem('loggedIn');
            sessionStorage.removeItem('loginTime');
            window.location.href = '../';
        }
    </script>
</body>
</html>

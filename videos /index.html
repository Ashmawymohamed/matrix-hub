<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفيديوهات - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:900px;width:100%;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:40px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6);text-align:center}
        .lock-icon{font-size:72px;display:block;margin-bottom:15px}
        h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#ec4899,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        p{color:#94a3b8;font-size:17px;margin:12px auto;max-width:450px;line-height:1.7}
        .back-link{display:inline-block;margin-top:25px;color:#f472b6;text-decoration:none;font-weight:bold;border:1px solid rgba(236,72,153,.3);padding:10px 28px;border-radius:12px;transition:all .3s}
        .back-link:hover{background:#ec4899;color:#fff;border-color:#ec4899;transform:translateY(-2px)}
        .footer{color:#475569;font-size:13px;margin-top:30px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}
    </style>
</head>
<body>
    <div class="container">
        <span class="lock-icon">🔒</span>
        <h1>📹 قسم الفيديوهات</h1>
        <p>هذا القسم <strong>مقفل</strong> حالياً. سيحتوي على شروحات ودروس تعليمية لاستخدام التأثيرات بشكل احترافي.</p>
        <a href="../" class="back-link">← العودة للرئيسية</a>
        <div class="footer">سيتم فتح هذا القسم قريباً — تابعونا!</div>
    </div>
</body>
</html>

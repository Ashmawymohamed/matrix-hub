<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:700px;width:100%;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:40px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6)}
        .header{text-align:center;margin-bottom:25px}
        .header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#f43f5e,#fb7185);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header p{color:#94a3b8;font-size:15px}
        .back-link{color:#fb7185;text-decoration:none;font-weight:bold;display:inline-block;margin-bottom:20px}
        .back-link:hover{text-decoration:underline}
        .contact-info{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
        .contact-card{background:rgba(0,0,0,.3);border-radius:14px;padding:18px;text-align:center;border:1px solid rgba(255,255,255,.06);transition:all .3s}
        .contact-card:hover{border-color:#f43f5e;transform:translateY(-3px)}
        .contact-card .icon{font-size:28px;display:block;margin-bottom:4px}
        .contact-card .label{font-weight:bold;color:#e2e8f0;font-size:14px}
        .contact-card .value{color:#94a3b8;font-size:13px;margin-top:3px;word-break:break-word}
        .footer{text-align:center;color:#475569;font-size:13px;margin-top:25px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}
        @media(max-width:500px){.contact-info{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✉️ تواصل معنا</h1>
            <p>نحن هنا لمساعدتك — أرسل لنا رسالتك وسنرد في أقرب وقت</p>
        </div>
        <a href="../" class="back-link">← العودة للرئيسية</a>
        <div class="contact-info">
            <div class="contact-card"><span class="icon">📧</span><span class="label">البريد الإلكتروني</span><span class="value">support@matrix-hub.com</span></div>
            <div class="contact-card"><span class="icon">🐙</span><span class="label">GitHub</span><span class="value">Ashmawymohamed</span></div>
            <div class="contact-card"><span class="icon">🐦</span><span class="label">تويتر</span><span class="value">@matrix_hub</span></div>
            <div class="contact-card"><span class="icon">💬</span><span class="label">رد سريع</span><span class="value">خلال 24 ساعة</span></div>
        </div>
        <div class="footer">نتطلع لسماع رأيك واقتراحاتك</div>
    </div>
</body>
</html>

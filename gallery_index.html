<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:sans-serif;padding:20px}
        .container{max-width:700px;margin:auto;background:rgba(20,25,45,.85);border-radius:28px;padding:30px 25px;border:1px solid rgba(255,255,255,.08)}
        h1{text-align:center}
        .back-btn{display:inline-block;background:#334155;color:#fff;padding:8px 20px;border-radius:30px;text-decoration:none;font-size:13px;margin-bottom:15px}
        .gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .gallery-item{background:#13182b;border-radius:12px;padding:10px;border:1px solid #2a3050;text-align:center}
        .gallery-item img{width:100%;border-radius:8px;height:auto}
        .gallery-item .caption{font-size:12px;color:#94a3b8;margin-top:6px}
        @media(max-width:480px){.gallery-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">Back to Hub</a>
        <h1>Gallery</h1>
        <p style="text-align:center;color:#94a3b8;margin-bottom:20px;">Matrix displays and setups</p>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="/files/images/matrix1.jpg" alt="Matrix Display 1">
                <div class="caption">45x32 Full Matrix</div>
            </div>
            <div class="gallery-item">
                <img src="/files/images/matrix2.jpg" alt="Matrix Display 2">
                <div class="caption">14x14 Tiny Matrix</div>
            </div>
        </div>
    </div>
</body>
</html>

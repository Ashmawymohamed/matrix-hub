<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإحصائيات - Matrix Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh}
        .container{max-width:1000px;margin:auto;background:linear-gradient(145deg,rgba(20,25,45,.92),rgba(10,12,30,.95));border-radius:32px;padding:35px 30px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.6)}
        .header{text-align:center;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:20px;margin-bottom:25px}
        .header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header p{color:#94a3b8;font-size:15px}
        .back-link{color:#818cf8;text-decoration:none;font-weight:bold;display:inline-block;margin-bottom:15px}
        .back-link:hover{text-decoration:underline}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;margin-top:15px}
        .stat-card{background:rgba(0,0,0,.3);border-radius:16px;padding:25px 15px;text-align:center;border:1px solid rgba(255,255,255,.06);transition:all .3s}
        .stat-card:hover{transform:translateY(-4px);border-color:#6366f1;box-shadow:0 12px 35px rgba(99,102,241,.08)}
        .stat-card .number{font-size:36px;font-weight:800;color:#818cf8;display:block}
        .stat-card .label{font-size:13px;color:#94a3b8;margin-top:4px}
        .stat-card .icon{font-size:28px;display:block;margin-bottom:6px}
        .footer{text-align:center;color:#475569;font-size:13px;margin-top:25px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}
        @media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 الإحصائيات</h1>
            <p>تحليلات التحميل واستخدام المنصة</p>
        </div>
        <a href="../" class="back-link">← العودة للرئيسية</a>
        <div class="stats-grid">
            <div class="stat-card"><span class="icon">📥</span><span class="number">1,247</span><span class="label">إجمالي التحميلات</span></div>
            <div class="stat-card"><span class="icon">📄</span><span class="number">16</span><span class="label">ملف تأثير</span></div>
            <div class="stat-card"><span class="icon">👤</span><span class="number">89</span><span class="label">مستخدم نشط</span></div>
            <div class="stat-card"><span class="icon">⭐</span><span class="number">4.8</span><span class="label">تقييم المستخدمين</span></div>
            <div class="stat-card"><span class="icon">📅</span><span class="number">27</span><span class="label">أيام منذ الإطلاق</span></div>
            <div class="stat-card"><span class="icon">🌍</span><span class="number">12</span><span class="label">دولة</span></div>
        </div>
        <div class="footer">يتم تحديث الإحصائيات يومياً</div>
    </div>
</body>
</html>

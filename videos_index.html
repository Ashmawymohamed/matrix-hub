<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tutorials</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:sans-serif;padding:20px}
        .container{max-width:700px;margin:auto;background:rgba(20,25,45,.85);border-radius:28px;padding:30px 25px;border:1px solid rgba(255,255,255,.08)}
        h1{text-align:center}
        .back-btn{display:inline-block;background:#334155;color:#fff;padding:8px 20px;border-radius:30px;text-decoration:none;font-size:13px;margin-bottom:15px}
        .locked-badge{color:#f59e0b;text-align:center;margin:10px 0}
        .video-grid{display:grid;grid-template-columns:1fr;gap:20px}
        .video-card{background:#13182b;border-radius:12px;padding:15px;border:1px solid #2a3050}
        video{width:100%;border-radius:8px;background:#000}
        .video-title{font-weight:bold;font-size:14px;margin-top:8px}
        .video-desc{font-size:12px;color:#94a3b8}
        @media(max-width:480px){.video-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">Back to Hub</a>
        <h1>Video Tutorials</h1>
        <div class="locked-badge">🔒 This section is password protected</div>
        <p style="text-align:center;color:#94a3b8;margin-bottom:20px;">Learn how to use the matrix system</p>
        <div class="video-grid">
            <div class="video-card">
                <video controls>
                    <source src="/files/videos/tutorial1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-title">How to Download Effects</div>
                <div class="video-desc">Step by step guide to download and install effects</div>
            </div>
            <div class="video-card">
                <video controls>
                    <source src="/files/videos/tutorial2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-title">How to Use SD Panel</div>
                <div class="video-desc">Learn how to run effects from the SD card</div>
            </div>
        </div>
    </div>
</body>
</html>
